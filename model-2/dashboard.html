<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal — Leo Group</title>
  <link rel="stylesheet" href="css/style.css?v=10">
  <style>
    :root {
      --surface-color: #1a1a1a;
      --border-color: #333;
      --text-muted: #888;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding-top: 100px; /* offset for fixed header */
    }
    
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 3rem;
    }

    /* Sidebar Navigation */
    .sidebar {
      position: sticky;
      top: 120px;
      height: max-content;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .sidebar-link {
      padding: 1rem;
      font-size: 1.1rem;
      color: var(--text-muted);
      border-left: 2px solid transparent;
      transition: all 0.3s ease;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .sidebar-link:hover {
      color: var(--text-color);
      border-left-color: #333;
    }
    .sidebar-link.active {
      color: var(--primary-color);
      border-left-color: var(--primary-color);
    }

    /* Main Content Area */
    .dashboard-content {
      background-color: var(--surface-color);
      border: 1px solid var(--border-color);
      padding: 3rem;
      min-height: 60vh;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 2rem;
    }

    .dashboard-header h2 {
      font-size: 2.5rem;
      margin: 0;
      font-weight: 300;
      letter-spacing: -1px;
    }

    /* Table Styles */
    .ledger-controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .ledger-controls input[type="date"] {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 0.8rem 1rem;
      font-family: inherit;
      outline: none;
    }
    
    .ledger-controls input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }

    .data-table-wrapper {
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }

    .data-table th, .data-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table th {
      color: var(--text-muted);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tbody tr:hover {
      background-color: #222;
    }

    .numeric {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Summary Cards */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    
    .card {
      border: 1px solid var(--border-color);
      padding: 2rem;
      background: #111;
    }
    
    .card-label {
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    
    .card-value {
      font-size: 2.5rem;
      font-weight: 300;
    }

    /* Loading State */
    .loader {
      display: none;
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-color);
      border-bottom-color: var(--primary-color);
      border-radius: 50%;
      animation: rotation 1s linear infinite;
      margin: 4rem auto;
    }
    
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

  </style>
</head>
<body>

  <!-- Reusable Header -->
  <header>
    <a href="index.html"><img src="logo.png" alt="Leo Group Logo" class="logo"></a>
        <input type="checkbox" id="mobile-menu-toggle" class="mobile-menu-toggle">
    <label for="mobile-menu-toggle" class="hamburger">
      <span></span><span></span><span></span>
    </label>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <a href="#" class="btn btn-outline" id="logoutBtn" style="border-color: #ff3333; color: #ff3333;">Sign Out</a>
  </header>

  <main class="dashboard-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="#" class="sidebar-link active">Ledger</a>
      <a href="#" class="sidebar-link">Inbox</a>
      <a href="#" class="sidebar-link">Certificates</a>
      <a href="#" class="sidebar-link">Settings</a>
    </aside>

    <!-- Main Content -->
    <section class="dashboard-content">
      <div class="dashboard-header">
        <h2>Stock Ledger</h2>
        <div class="ledger-controls">
          <input type="date" id="ledgerDate">
          <button class="btn btn-primary" id="searchBtn" style="padding: 0.8rem 2rem;">Query</button>
        </div>
      </div>

      <div class="summary-cards">
        <div class="card">
          <div class="card-label">Total Sales Value</div>
          <div class="card-value" id="totalSales">₹0.00</div>
        </div>
        <div class="card">
          <div class="card-label">Total Closing Value</div>
          <div class="card-value" id="totalClosing">₹0.00</div>
        </div>
      </div>

      <div class="loader" id="loader"></div>

      <div class="data-table-wrapper">
        <table class="data-table" id="ledgerTable">
          <thead>
            <tr>
              <th>Item Code</th>
              <th>Name</th>
              <th class="numeric">P-Rate</th>
              <th class="numeric">Op. Stock</th>
              <th class="numeric">Purch Qty</th>
              <th class="numeric">Sales Qty</th>
              <th class="numeric">S-Value</th>
              <th class="numeric">Cl. Stock</th>
              <th class="numeric">Cl-Value</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="9" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                Select a date to load your ledger data.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Set today's date as default
      const today = new Date().toISOString().split('T')[0];
      const dateInput = document.getElementById('ledgerDate');
      dateInput.value = today;

      const loadLedger = async (date) => {
        const tbody = document.querySelector("#ledgerTable tbody");
        const loader = document.getElementById("loader");
        const table = document.getElementById("ledgerTable");
        
        table.style.display = 'none';
        loader.style.display = 'block';

        try {
          const response = await fetch(`api/v1/ledger.php?date=${date}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Authentication failed");
          }

          if (data.records === 0) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; padding: 3rem; color: var(--text-muted);">No stock ledger records found for this date.</td></tr>`;
          } else {
            let html = "";
            data.data.forEach(row => {
              html += `
                <tr>
                  <td>${row.code}</td>
                  <td><strong>${row.name}</strong></td>
                  <td class="numeric">${row.prate}</td>
                  <td class="numeric">${row.op_stock}</td>
                  <td class="numeric">${row.purchase_qty}</td>
                  <td class="numeric">${row.sales_qty}</td>
                  <td class="numeric" style="color: var(--primary-color);">₹${parseFloat(row.s_value).toFixed(2)}</td>
                  <td class="numeric"><strong>${row.cl_stock}</strong></td>
                  <td class="numeric">₹${parseFloat(row.cl_value).toFixed(2)}</td>
                </tr>
              `;
            });
            tbody.innerHTML = html;
          }

          // Update summary cards
          document.getElementById('totalSales').textContent = `₹${parseFloat(data.totals.s_value).toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
          document.getElementById('totalClosing').textContent = `₹${parseFloat(data.totals.cl_value).toLocaleString('en-IN', {minimumFractionDigits: 2})}`;

        } catch (error) {
          if(error.message.includes("Unauthorized")) {
             window.location.href = "index.html"; // Redirect to login
          }
          tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; padding: 3rem; color: #ff3333;">Error: ${error.message}</td></tr>`;
        } finally {
          loader.style.display = 'none';
          table.style.display = 'table';
        }
      };

      // Load initial data
      loadLedger(today);

      // Handle search click
      document.getElementById('searchBtn').addEventListener('click', () => {
        loadLedger(dateInput.value);
      });

      // Handle logout
      document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        // Since we don't have an api/v1/logout.php yet, we can create one, or just call the old one.
        // Let's call a new endpoint we will create.
        fetch('api/v1/logout.php', { method: 'POST' }).then(() => {
          window.location.href = 'index.html';
        });
      });
    });
  </script>
</body>
</html>
